name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Byte-compile check (catches syntax errors)
        run: python -m py_compile app/*.py
      - name: Import smoke test
        run: |
          cd app
          python -c "import server; print('server module imports cleanly')"
